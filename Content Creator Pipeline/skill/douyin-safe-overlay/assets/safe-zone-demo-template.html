<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Douyin Safe Overlay Template</title>
<style>
  *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:#ded7ce;font-family:Inter,"Noto Sans SC",sans-serif;color:#111318}
  .phone{position:relative;width:1280px;height:720px;overflow:hidden;border:8px solid #111318;border-radius:34px;background:linear-gradient(160deg,#f8f1e9,#edf4ff)}
  .zone{position:absolute;border:2px dashed;border-radius:18px;display:grid;place-items:center;text-align:center;font-weight:900;line-height:1.25;padding:10px;pointer-events:none}
  .face-safe{left:124px;top:100px;width:300px;height:240px;color:#16a36b;background:rgba(22,163,107,.1)}
  .text-safe{left:86px;top:368px;width:520px;height:174px;color:#377dff;background:rgba(55,125,255,.1)}
  .right-danger{top:26px;right:22px;width:172px;height:620px;color:#ff8a2a;background:rgba(255,138,42,.11);writing-mode:vertical-rl}
  .bottom-danger{left:30px;right:214px;bottom:24px;height:130px;color:#ef4444;background:rgba(239,68,68,.1)}
  .person{position:absolute;left:110px;top:104px;width:280px;height:520px;z-index:8}
  .head{position:absolute;left:68px;top:0;width:126px;height:150px;border-radius:52% 48% 46% 50%;background:#f1c6a8;border:4px solid #111318;box-shadow:6px 6px 0 #111318}
  .hair{position:absolute;left:56px;top:-18px;width:145px;height:78px;border-radius:60% 45% 50% 35%;background:#1c1b1a;border:4px solid #111318}
  .eye{position:absolute;top:64px;width:10px;height:10px;border-radius:50%;background:#111318}.eye.left{left:100px}.eye.right{left:146px}
  .mouth{position:absolute;left:114px;top:104px;width:42px;height:14px;border-bottom:4px solid #111318;border-radius:0 0 32px 32px}
  .body{position:absolute;left:36px;top:186px;width:208px;height:310px;border-radius:58px 58px 24px 24px;background:#1f2937;border:4px solid #111318;box-shadow:8px 8px 0 #111318}
  .overlay{position:absolute;left:468px;top:390px;width:352px;min-height:142px;z-index:16;border:4px solid #111318;border-radius:22px;background:#edfdf5;box-shadow:7px 7px 0 #111318;padding:20px;font-weight:950}
  .overlay h2{margin:0;font-size:30px;line-height:1.15}.overlay p{margin:8px 0 0;color:#667085;font-size:16px;font-weight:800}
  .ui{position:absolute;top:210px;right:32px;display:grid;gap:22px;z-index:18}.ui div{width:58px;height:58px;border-radius:50%;border:3px solid #111318;background:#fff;display:grid;place-items:center;font-size:24px;font-weight:950}
</style>
</head>
<body>
  <div class="phone">
    <div class="zone face-safe">face safe</div>
    <div class="zone text-safe">text/card safe</div>
    <div class="zone right-danger">right UI danger</div>
    <div class="zone bottom-danger">bottom UI danger</div>
    <div class="person"><div class="hair"></div><div class="head"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div><div class="body"></div></div>
    <div class="overlay"><h2>Horizontal overlay</h2><p>Use this when the speaker stays visible.</p></div>
    <div class="ui"><div>♥</div><div>评</div><div>转</div><div>⋯</div></div>
  </div>
</body>
</html>
