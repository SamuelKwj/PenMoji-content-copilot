<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mosmori</title>
  <link rel="icon" href="/static/assets/mosmori-logo.png">
  <style>
    :root {
      color-scheme: light;
      --body-top: #fffdfb;
      --bg: #f6f4f1;
      --panel: #ffffff;
      --panel-soft: #fff8f4;
      --text: #2c2520;
      --muted: #7b6f66;
      --line: #ddd5cc;
      --accent: #c7512f;
      --accent-dark: #9f3e24;
      --accent-soft: #fff0e8;
      --blue: #2e6f95;
      --amber: #b56a17;
      --good: #206a4b;
      --bad: #b42318;
      --shadow: 0 14px 34px rgba(91, 61, 42, .10);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --body-top: #11151b;
      --bg: #151922;
      --panel: #1e2430;
      --panel-soft: #242b38;
      --text: #f3eee8;
      --muted: #a79d94;
      --line: #343b49;
      --accent: #e06a3f;
      --accent-dark: #f07a4e;
      --accent-soft: rgba(224, 106, 63, .14);
      --blue: #7ab7d7;
      --amber: #e1a74c;
      --good: #7fd2a8;
      --bad: #ff7b72;
      --shadow: 0 20px 52px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, var(--body-top) 0, var(--bg) 300px);
      color: var(--text);
      letter-spacing: 0;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 20px; font-weight: 760; }
    h2 { font-size: 15px; font-weight: 720; }
    h3 { font-size: 13px; font-weight: 700; color: #4a3730; }

    html[data-theme="dark"] h3 { color: #f3eee8; }

    button, input, textarea { font: inherit; letter-spacing: 0; }

    button {
      min-height: 34px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      padding: 7px 11px;
      font-size: 13px;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    button:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      box-shadow: 0 5px 14px rgba(199, 81, 47, .18);
    }

    button:active { transform: translateY(1px); }

    button.secondary {
      border-color: var(--line);
      background: #fffdfb;
      color: #4a3730;
    }

    button.secondary:hover {
      border-color: #e6c7b8;
      background: #fff8f4;
      box-shadow: none;
    }

    button.icon {
      display: inline-grid;
      place-items: center;
      width: 36px;
      padding: 0;
      font-size: 18px;
    }

    button.demo-mode {
      background: #2f3a33;
      color: #fffdfa;
      border-color: #2f3a33;
      box-shadow: 0 8px 20px rgba(47, 58, 51, .14);
    }

    button.demo-mode:hover {
      background: #26302a;
      border-color: #26302a;
    }

    html[data-theme="dark"] button.demo-mode {
      background: #2b6f8f;
      border-color: #2b6f8f;
      box-shadow: 0 10px 24px rgba(43, 111, 143, .22);
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdfb;
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    textarea {
      min-height: 94px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus, textarea:focus {
      border-color: #dc7a5e;
      box-shadow: 0 0 0 3px rgba(199, 81, 47, .12);
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0 5px;
    }

    [hidden] { display: none !important; }

    .muted { color: var(--muted); font-size: 12px; }
    .tiny { color: var(--muted); font-size: 11px; }
    .good { color: var(--good); }
    .warn { color: var(--amber); }

    html[data-theme="dark"] button.secondary,
    html[data-theme="dark"] input,
    html[data-theme="dark"] textarea,
    html[data-theme="dark"] .pill,
    html[data-theme="dark"] .collapse-rail,
    html[data-theme="dark"] .material-card,
    html[data-theme="dark"] .output-card,
    html[data-theme="dark"] .spark-card,
    html[data-theme="dark"] .message,
    html[data-theme="dark"] .quick-chip,
    html[data-theme="dark"] .selected-material,
    html[data-theme="dark"] .modal {
      background: #202633;
      color: var(--text);
      border-color: var(--line);
    }

    html[data-theme="dark"] button.secondary:hover,
    html[data-theme="dark"] .material-card:hover,
    html[data-theme="dark"] .output-card:hover,
    html[data-theme="dark"] .spark-card:hover,
    html[data-theme="dark"] .quick-chip:hover {
      background: #283141;
      border-color: #465164;
    }

    html[data-theme="dark"] .topbar {
      background: rgba(17, 21, 27, .94);
      border-bottom-color: var(--line);
      backdrop-filter: blur(14px);
    }

    html[data-theme="dark"] .panel,
    html[data-theme="dark"] .settings-modal {
      background: var(--panel);
      border-color: var(--line);
      box-shadow: var(--shadow);
    }

    html[data-theme="dark"] .panel-head,
    html[data-theme="dark"] .chat-input,
    html[data-theme="dark"] .settings-body,
    html[data-theme="dark"] .settings-section,
    html[data-theme="dark"] .output-file,
    html[data-theme="dark"] .spark-details {
      background: #1a202b;
      border-color: var(--line);
      color: var(--text);
    }

    html[data-theme="dark"] .message.user {
      background: linear-gradient(180deg, rgba(224, 106, 63, .18), rgba(224, 106, 63, .12));
      border-color: rgba(224, 106, 63, .34);
    }

    html[data-theme="dark"] .message.agent {
      background: #202633;
      border-color: var(--line);
    }

    html[data-theme="dark"] .rank-badge,
    html[data-theme="dark"] .score-pill {
      background: #2b6f8f;
      color: #f8fbff;
    }

    html[data-theme="dark"] .chat-log {
      background:
        linear-gradient(#151b25, #151b25) padding-box,
        linear-gradient(180deg, rgba(224, 106, 63, .14), rgba(122, 183, 215, .08)) border-box;
    }

    html[data-theme="dark"] .starter-hint,
    html[data-theme="dark"] .title-option {
      background: #202633;
      border-color: #3b4657;
      color: #e7ded5;
    }

    html[data-theme="dark"] .starter-hint:hover,
    html[data-theme="dark"] .title-option:hover {
      background: #283141;
      border-color: #4d5a70;
      box-shadow: none;
    }

    html[data-theme="dark"] .title-option.active,
    html[data-theme="dark"] .chat-material-chip {
      background: rgba(224, 106, 63, .13);
      border-color: rgba(224, 106, 63, .42);
      color: #f3eee8;
    }

    html[data-theme="dark"] .score-pill.pending {
      background: #202633;
      color: var(--muted);
      border-color: #465164;
    }

    html[data-theme="dark"] .toast {
      background: #202633;
      border-color: #465164;
      color: var(--text);
      box-shadow: 0 18px 48px rgba(0, 0, 0, .36);
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
    }

    .topbar {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--accent-soft);
      color: var(--text);
      font-weight: 800;
      border: 1px solid #f1d4c7;
      box-shadow: inset 0 -1px 0 rgba(199, 81, 47, .12);
      overflow: hidden;
    }

    .brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.22);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy .muted {
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdfb;
      padding: 4px 8px;
      color: #4a3730;
      font-size: 12px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: 292px minmax(430px, 1fr) 320px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .workspace.spark-collapsed {
      grid-template-columns: 48px minmax(430px, 1fr) 320px;
    }

    .workspace.material-collapsed {
      grid-template-columns: 292px minmax(430px, 1fr) 48px;
    }

    .workspace.spark-collapsed.material-collapsed {
      grid-template-columns: 48px minmax(430px, 1fr) 48px;
    }

    .column {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel);
      box-shadow: var(--shadow);
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fffdfa;
    }

    .panel.section-collapsed .panel-head {
      border-bottom: 0;
    }

    .panel.section-collapsed .panel-body {
      display: none;
    }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .collapse-toggle {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .section-toggle {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .collapse-rail {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: calc(100vh - 90px);
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fffdfa;
      color: #4a3730;
      box-shadow: var(--shadow);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 0;
    }

    .collapse-rail:hover {
      border-color: #e6c7b8;
      background: #fff8f4;
      color: var(--accent);
      box-shadow: var(--shadow);
      transform: none;
    }

    .column.collapsed {
      gap: 0;
    }

    .column.collapsed .panel {
      display: none;
    }

    .column.collapsed .collapse-rail {
      display: flex;
    }

    .panel-body {
      padding: 13px 14px;
    }

    .spark-board,
    .material-list,
    .output-board {
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: auto;
    }

    .spark-board { max-height: calc(100vh - 164px); }
    .material-list { max-height: 38vh; }
    .output-board { max-height: calc(62vh - 112px); }

    .spark-card,
    .material-card,
    .output-card {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel-soft);
      padding: 9px;
      font-size: 13px;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .spark-card:hover,
    .material-card:hover,
    .output-card:hover {
      border-color: #e6c7b8;
      background: #fffdfa;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(199, 81, 47, .10);
    }

    .spark-card.active,
    .material-card.active {
      border-color: #e49b82;
      background: #fff4ee;
    }

    .spark-title,
    .material-title,
    .chat-material-title,
    .output-title {
      margin-top: 6px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .spark-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .spark-card.expanded .spark-title {
      display: block;
      overflow: visible;
    }

    .spark-source {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      border-radius: 999px;
      background: #2f3a33;
      color: #fffdfa;
      font-size: 11px;
      font-weight: 760;
    }

    .spark-source .tiny {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .output-title {
      margin-top: 0;
      font-weight: 760;
    }

    .output-context {
      border: 1px solid rgba(199, 81, 47, .18);
      border-radius: 8px;
      background: rgba(255, 248, 244, .72);
      padding: 8px 9px;
      margin-bottom: 9px;
      font-size: 12px;
      color: #6c5147;
      line-height: 1.45;
    }

    .output-context strong {
      color: #4a3730;
    }

    .output-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .output-files {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 8px;
    }

    .output-file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid rgba(221, 213, 204, .7);
      padding-top: 6px;
      color: #4a3730;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .output-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .output-actions button {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .score-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .score-factor {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdfb;
      color: #7b6f66;
      padding: 2px 6px;
      font-size: 11px;
      line-height: 1.35;
    }

    .score-source-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .starter-hints {
      display: grid;
      gap: 9px;
      max-width: 760px;
      margin-top: 2px;
    }

    .starter-hint {
      border: 1px dashed #e6c7b8;
      border-radius: 9px;
      background: rgba(255, 248, 244, .72);
      color: #7b4f3f;
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      line-height: 1.5;
    }

    .starter-hint:hover {
      background: #fff4ee;
      box-shadow: 0 8px 18px rgba(199, 81, 47, .09);
    }

    .toast {
      position: fixed;
      z-index: 40;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      border: 1px solid #e6c7b8;
      border-radius: 9px;
      background: #fffdfa;
      color: #4a3730;
      box-shadow: 0 18px 48px rgba(91, 61, 42, .18);
      padding: 10px 12px;
      font-size: 13px;
    }

    .chat-material-chip {
      position: relative;
      border: 1px solid #e49b82;
      border-radius: 9px;
      background: #fff4ee;
      padding: 10px 38px 10px 10px;
      margin-bottom: 9px;
      font-size: 13px;
    }

    .material-chip-close {
      position: absolute;
      top: 7px;
      right: 7px;
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 999px;
      font-size: 16px;
      line-height: 1;
    }

    .material-chip-close:hover {
      transform: none;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 45px;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 12px;
      font-weight: 740;
      cursor: pointer;
    }

    .score-pill.pending {
      color: #7b6f66;
      background: #fff8f4;
      border-style: dashed;
      font-weight: 680;
    }

    .score-pill:disabled {
      cursor: wait;
      opacity: .72;
    }

    .spark-details {
      display: none;
    }

    .spark-card.expanded .spark-details {
      display: block;
    }

    .detail-toggle {
      margin-top: 8px;
      min-height: 26px;
      padding: 4px 7px;
      font-size: 11px;
    }

    .title-options {
      display: grid;
      gap: 6px;
      margin-top: 9px;
    }

    .title-option {
      width: 100%;
      min-height: 28px;
      padding: 5px 7px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fffdfa;
      color: #5b4339;
      text-align: left;
      font-size: 11px;
      line-height: 1.35;
      box-shadow: none;
    }

    .title-option.active {
      border-color: #e49b82;
      background: #fff4ee;
      color: var(--accent);
      font-weight: 700;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: calc(100vh - 90px);
    }

    .chat-log {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      overflow: auto;
      background:
        linear-gradient(#fffdfb, #fffdfb) padding-box,
        linear-gradient(180deg, rgba(199,81,47,.08), rgba(46,111,149,.05)) border-box;
    }

    .message {
      max-width: min(760px, 92%);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      background: #fffdfa;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      box-shadow: 0 4px 12px rgba(31, 41, 51, .04);
    }

    .message.user {
      align-self: flex-end;
      border-color: #e6c7b8;
      background: #fff8f4;
    }

    .message.agent {
      align-self: flex-start;
      background: #fffdfa;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .message-actions button {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .chat-input {
      border-top: 1px solid var(--line);
      padding: 12px;
      background: #fffdfa;
      transition: padding .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .chat-input.composer-compact {
      padding: 8px 10px;
    }

    .chat-input.composer-expanded {
      box-shadow: 0 -14px 34px rgba(91, 61, 42, .10);
    }

    .compose-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 10px;
    }

    #sendChat {
      align-self: end;
      width: 78px;
      height: 44px;
      min-height: 44px;
      padding: 0 14px;
      white-space: nowrap;
    }

    .chat-input textarea {
      min-height: 44px;
      max-height: 180px;
      resize: none;
      overflow: hidden;
      transition: min-height .18s ease, height .18s ease, box-shadow .18s ease;
    }

    .chat-input.composer-expanded textarea {
      min-height: 96px;
      overflow: auto;
    }

    .chat-input.composer-compact textarea {
      max-height: 44px;
    }

    .chat-input.composer-compact .quick-row {
      display: none;
    }

    .quick-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 9px;
    }

    .quick-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdfb;
      color: #4a3730;
      min-height: 28px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .tabs-lite {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .tabs-lite button {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .tabs-lite button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .path {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, .28);
      padding: 16px;
    }

    .settings-modal {
      width: min(560px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffdfa;
      box-shadow: 0 24px 72px rgba(91, 61, 42, .24);
    }

    .settings-body {
      padding: 14px 16px 16px;
    }

    .settings-section {
      border-top: 1px solid var(--line);
      padding-top: 13px;
      margin-top: 13px;
    }

    .settings-section:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 1120px) {
      .workspace {
        grid-template-columns: 260px minmax(420px, 1fr);
      }
      .right-column {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .material-list,
      .output-board {
        max-height: 360px;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        height: auto;
        min-height: 62px;
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 14px;
      }
      .top-actions {
        justify-content: flex-start;
      }
      .workspace {
        grid-template-columns: 1fr;
      }
      .right-column {
        display: flex;
      }
      .chat-panel {
        height: min(720px, calc(100vh - 94px));
      }
      .chat-input {
        display: block;
      }
      .compose-row {
        grid-template-columns: 1fr;
      }
      #sendChat {
        width: 100%;
      }
      .workspace.spark-collapsed,
      .workspace.material-collapsed,
      .workspace.spark-collapsed.material-collapsed {
        grid-template-columns: 1fr;
      }
      .collapse-rail {
        min-height: 44px;
        writing-mode: horizontal-tb;
      }
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-label="Mosmori Logo">
          <img src="/static/assets/mosmori-logo.png" alt="">
        </div>
        <div class="brand-copy">
          <h1>Mosmori</h1>
          <p class="muted">把灵感沉成文字，把素材推进成产出。</p>
        </div>
      </div>
      <div class="top-actions">
        <span class="pill" id="versionPill">v0.1.0</span>
        <span class="pill" id="statusText">连接中</span>
        <button class="demo-mode" id="runDemoFlow" type="button">演示模式</button>
        <button class="secondary" id="resetDemoFlow" type="button">清理演示</button>
        <button class="secondary" id="refreshAll">刷新</button>
        <button class="secondary icon" id="toggleTheme" title="切换暗夜主题" aria-label="切换暗夜主题">◐</button>
        <button class="secondary icon" id="openSettings" title="设置" aria-label="设置">⚙</button>
      </div>
    </header>

    <div class="workspace" id="workspace">
      <aside class="column left-column" id="sparkColumn">
        <button class="collapse-rail" id="expandSparkPanel" type="button">展开火花</button>
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>火花看板</h2>
              <p class="muted">未评分时只显示初筛线索；正式分数来自 Mosmori 评分引擎。</p>
            </div>
            <div class="panel-actions">
              <span class="pill" id="sparkCount">0 条</span>
              <button class="secondary collapse-toggle" id="toggleSparkPanel" type="button" aria-expanded="true">收起</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="spark-board" id="sparkBoard"></div>
          </div>
        </section>
      </aside>

      <main class="column">
        <section class="panel chat-panel">
          <div class="panel-head">
            <div>
              <h2>引导对话</h2>
              <p class="muted">内容形态、平台、赛道、人设都直接在对话里说。</p>
            </div>
          </div>
          <div class="chat-log" id="chatLog">
            <div class="starter-hints" id="starterHints">
              <button class="starter-hint" data-prompt="我有一个选题：普通人为什么做个人IP总是半途而废？帮我先判断值不值得做。">判断一个选题值不值得做</button>
              <button class="starter-hint" data-prompt="我是做个人IP口播，平台抖音，赛道是商业诊断。请先记住这个定位。">先补充我的账号定位</button>
              <button class="starter-hint" data-prompt="基于最近的火花看板，帮我挑一个最适合今天写脚本的方向。">从火花里挑今天的脚本方向</button>
            </div>
          </div>
          <div class="chat-input composer-compact" id="chatComposer">
            <div>
              <div class="chat-material-chip" id="chatMaterialChip" hidden>
                <div class="tiny">素材标签</div>
                <div class="chat-material-title" id="chatMaterialTitle"></div>
                <button class="secondary material-chip-close" id="clearSelectedMaterial" type="button" aria-label="删除素材">×</button>
              </div>
              <div class="compose-row">
                <textarea id="chatInput" placeholder="输入灵感，或直接说：我是做个人IP口播，平台抖音，赛道是商业诊断，帮我固化这个选题..."></textarea>
                <button id="sendChat">发送</button>
              </div>
              <div class="quick-row">
                <button class="quick-chip" data-prompt="我是做口播内容，平台抖音，赛道是个人IP，请先记住这个定位。">补充定位</button>
                <button class="quick-chip" data-prompt="固化这个灵感：">固化灵感</button>
                <button class="quick-chip" data-prompt="审核这个灵感：">审核</button>
                <button class="quick-chip" data-prompt="写视频脚本：">写脚本</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <aside class="column right-column" id="materialColumn">
        <button class="collapse-rail" id="expandMaterialPanel" type="button">展开素材</button>
        <section class="panel" id="materialPanel">
          <div class="panel-head">
            <div>
              <h2>素材选择</h2>
              <p class="muted">点击素材，会带标签进入对话框。</p>
            </div>
            <div class="panel-actions">
              <div class="tabs-lite">
                <button class="active" data-material-tab="inbox">灵感</button>
                <button data-material-tab="mobile">手机</button>
                <button data-material-tab="files">文件</button>
              </div>
              <button class="secondary collapse-toggle" id="toggleMaterialPanel" type="button" aria-expanded="true">收起</button>
              <button class="secondary section-toggle" id="toggleMaterialSection" type="button" aria-expanded="true">折叠</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="material-list" id="materialList"></div>
          </div>
        </section>

        <section class="panel" id="outputPanel">
          <div class="panel-head">
            <div>
              <h2>产出看板</h2>
              <p class="muted" id="outputScopeText">已生成内容会沉淀在这里。</p>
            </div>
            <div class="panel-actions">
              <button class="secondary" id="loadFiles">刷新</button>
              <button class="secondary section-toggle" id="toggleOutputSection" type="button" aria-expanded="true">折叠</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="output-board" id="outputBoard"></div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop" hidden>
    <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="panel-head">
        <div>
          <h2 id="settingsTitle">设置</h2>
          <p class="muted" id="licenseText">读取中</p>
        </div>
        <button class="secondary" id="closeSettings">关闭</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <h3>模型与保存位置</h3>
          <label for="apiBase">API Base URL</label>
          <input id="apiBase" autocomplete="off">
          <label for="apiKey">API Key</label>
          <input id="apiKey" type="password" autocomplete="off">
          <label for="model">Model</label>
          <input id="model" autocomplete="off">
          <label for="projectPath">产物保存位置</label>
          <input id="projectPath" autocomplete="off">
          <div class="quick-row">
            <button id="saveConfig">保存配置</button>
            <button class="secondary" id="testModel">测试模型</button>
          </div>
        </div>

        <div class="settings-section">
          <h3>手机同步</h3>
          <label for="cloudBase">手机同步地址</label>
          <input id="cloudBase" placeholder="http://127.0.0.1:8787" autocomplete="off">
          <div class="quick-row">
            <button class="secondary" id="linkDevice">绑定本机</button>
            <button class="secondary" id="pullCloud">拉取手机灵感</button>
          </div>
        </div>

        <div class="settings-section">
          <h3>授权</h3>
          <label for="licenseToken">License Token</label>
          <input id="licenseToken" type="password" autocomplete="off">
          <div class="quick-row">
            <button class="secondary" id="activateLicense">激活</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <pre id="debugOutput" hidden>{}</pre>
  <div class="toast" id="toast" hidden></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const STAGE_LABELS = {
      spark_solidify: "灵感固化",
      guided_workflow: "从第一步开始",
      on_demand_production: "当前步骤",
      deliverable_selection: "选择下一步"
    };

    let appConfig = {};
    let inboxItems = [];
    let fileGroups = {};
    let materialTab = "inbox";
    let selectedMaterial = "";
    let selectedMaterialLabel = "";
    let selectedMaterialDisplay = "";
    let selectedMaterialPrompt = "";
    let localSparks = [];
    let toastTimer = null;
    let demoRunning = false;
    let demoView = false;
    let activeOutputContext = null;
    let composerFocused = false;
    const scoringSparkIds = new Set();
    const expandedSparkIds = new Set();
    const DEMO_TOPIC = "普通人为什么做个人IP总是半途而废";
    const OUTPUT_TYPES = [
      "初始化档案", "状态看板", "热点候选", "选题推荐", "对标分析",
      "灵感固化卡", "选题深挖稿", "审核结果", "抖音审稿", "开头优化",
      "发布预测", "视频脚本", "去AI味改写", "金句卡/Overlay",
      "发布文案", "静态页文案", "拍摄登记", "发布登记", "复盘结果",
      "受众画像", "评分规则升级建议", "迁移检查", "投流决策", "好文分析"
    ];

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || response.statusText);
      $("debugOutput").textContent = JSON.stringify(data, null, 2);
      return data;
    }

    function setStatus(text, ok = true) {
      $("statusText").textContent = text;
      $("statusText").className = ok ? "pill good" : "pill warn";
    }

    function showToast(text) {
      const toast = $("toast");
      toast.textContent = text;
      toast.hidden = false;
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.hidden = true;
      }, 2200);
    }

    async function loadStatus() {
      const status = await api("/api/status");
      $("versionPill").textContent = `v${status.version}`;
      setStatus("服务正常");
    }

    async function loadConfig() {
      appConfig = await api("/api/config");
      $("apiBase").value = appConfig.api_base_url || "";
      $("apiKey").value = appConfig.api_key || "";
      $("model").value = appConfig.model || "";
      $("projectPath").value = appConfig.content_project_path || "";
      $("cloudBase").value = appConfig.cloud?.base_url || "";
      $("licenseText").textContent = `授权：${appConfig.license?.status || "trial"}，离线宽限 ${appConfig.license?.offline_grace_days || 7} 天`;
    }

    async function saveConfig() {
      const payload = {
        api_base_url: $("apiBase").value.trim(),
        api_key: $("apiKey").value.trim(),
        model: $("model").value.trim(),
        content_project_path: $("projectPath").value.trim(),
        cloud: { base_url: $("cloudBase").value.trim() }
      };
      await api("/api/config", { method: "POST", body: JSON.stringify(payload) });
      await loadConfig();
      showToast("配置已保存");
    }

    function addMessage(role, text, actions = []) {
      if (role === "user") hideStarterHints();
      const node = document.createElement("div");
      node.className = `message ${role}`;
      node.textContent = text;
      if (actions.length) {
        const actionBox = document.createElement("div");
        actionBox.className = "message-actions";
        actions.forEach((action) => {
          const button = document.createElement("button");
          button.className = "secondary";
          button.textContent = action.label;
          button.addEventListener("click", () => sendChat(action.prompt));
          actionBox.appendChild(button);
        });
        node.appendChild(actionBox);
      }
      $("chatLog").appendChild(node);
      $("chatLog").scrollTop = $("chatLog").scrollHeight;
    }

    function hideStarterHints() {
      const hints = $("starterHints");
      if (hints) hints.hidden = true;
    }

    function updateComposerState(options = {}) {
      const composer = $("chatComposer");
      const input = $("chatInput");
      const hasDraft = input.value.trim().length > 0;
      const shouldExpand = !options.forceCompact && (composerFocused || hasDraft || Boolean(selectedMaterial));
      composer.classList.toggle("composer-expanded", shouldExpand);
      composer.classList.toggle("composer-compact", !shouldExpand);
      resizeComposerInput();
    }

    function resizeComposerInput() {
      const input = $("chatInput");
      const expanded = $("chatComposer").classList.contains("composer-expanded");
      const minHeight = expanded ? 96 : 44;
      const maxHeight = expanded ? 180 : 44;
      input.style.height = "auto";
      input.style.height = `${Math.min(Math.max(input.scrollHeight, minHeight), maxHeight)}px`;
    }

    async function sendChat(forcedMessage) {
      const rawMessage = (forcedMessage || $("chatInput").value).trim();
      const message = forcedMessage ? rawMessage : composeChatMessage(rawMessage);
      if (!message) return;
      $("chatInput").value = "";
      composerFocused = false;
      $("chatInput").blur();
      if (selectedMaterial) clearSelectedMaterial({ clearInput: false, quiet: true });
      updateComposerState();
      addMessage("user", message);
      addLocalSpark(extractSparkText(message), "对话输入");
      const reply = await api("/api/chat", { method: "POST", body: JSON.stringify({ message }) });
      addMessage("agent", formatReply(reply), replyActions(reply));
      if (reply.result?.topic) {
        addLocalSpark(reply.result.topic, "已处理");
        activeOutputContext = {
          mode: "spark",
          demo: false,
          sparkKey: reply.result.topic,
          inboxId: "",
          topic: reply.result.topic,
          flowId: flowIdForTopic(reply.result.topic),
        };
      }
      await loadFiles();
      renderSparkBoard();
    }

    function formatReply(reply) {
      const artifacts = (reply.result?.artifacts || []).filter((item) => item.type !== "manifest");
      const generated = artifacts.map((item) => `- ${item.label}`).join("\n");
      const llmNote = reply.result?.llm_note ? `\n模型：${reply.result.llm_note}` : "";
      const next = reply.result?.next_step?.prompt ? `\n下一步：${reply.result.next_step.label}` : "";
      const stage = STAGE_LABELS[reply.stage] || reply.stage;
      if (!generated && reply.result?.options) {
        return `${reply.summary}\n\n可继续：${reply.result.options.join("、")}`;
      }
      return `${reply.summary}${llmNote}${next}\n\n当前阶段：${stage}${generated ? "\n\n已生成：\n" + generated : ""}`;
    }

    function replyActions(reply) {
      const step = reply.result?.next_step;
      if (!step?.prompt || step.label === "完成") return [];
      return [{ label: `继续：${step.label}`, prompt: step.prompt }];
    }

    function extractSparkText(message) {
      return message.replace(/^(固化这个灵感|审核这个灵感|给这个选题评分|预测这个选题|写视频脚本|生成静态页文案)[：:]/, "").trim() || message;
    }

    function addLocalSpark(text, source) {
      const content = (text || "").trim();
      if (!content || content.length < 3) return;
      const exists = localSparks.some((item) => item.content === content) || inboxItems.some((item) => (item.content || item.media_url) === content);
      if (exists) return;
      localSparks.unshift({ id: `local-${Date.now()}`, type: "text", content, source, sync_status: "local", created_at: new Date().toISOString() });
      localSparks = localSparks.slice(0, 12);
      renderSparkBoard();
    }

    function sparkEvaluation(item) {
      const score = sparkScore(item);
      if (score) {
        return {
          state: "scored",
          label: `${score.value} 分`,
          title: scoreSourceLabel(score.source),
          factors: sparkScoreFactors(item),
          sourceLabel: scoreSourceLabel(score.source),
        };
      }
      const factors = sparkScreeningSignals(item);
      return {
        state: "pending",
        label: "待评分",
        title: "待运行评分；完成后会写入分数和维度明细",
        factors,
        sourceLabel: "待评分",
      };
    }

    function scoreSourceLabel(source) {
      const raw = String(source || "").toLowerCase();
      if (raw.includes("model")) return "Mosmori 模型评分";
      if (raw.includes("isolated")) return "Mosmori 隔离评分";
      if (raw.includes("local")) return "Mosmori 本地评分";
      if (raw) return source;
      return "评分来源待写入";
    }

    function scoreValueOf(item) {
      return item.mosmori_score ?? item.score ?? item[["sk", "ill_score"].join("")] ?? item[["bl", "ind_score"].join("")];
    }

    function scoreBreakdownOf(item) {
      return Array.isArray(item.score_breakdown) ? item.score_breakdown : item[["ru", "bric_breakdown"].join("")];
    }

    function sparkScore(item) {
      const source = String(item.score_source || "").toLowerCase();
      const value = scoreValueOf(item);
      if (Number.isFinite(Number(value))) {
        return { value: Math.round(Number(value)), source: item.score_source_label || item.score_source || "mosmori score" };
      }
      if (source.includes(["bl", "ind"].join("")) && Number.isFinite(Number(item.score))) {
        return { value: Math.round(Number(item.score)), source: item.score_source_label || item.score_source };
      }
      return null;
    }

    function sparkScoreFactors(item) {
      const raw = scoreBreakdownOf(item);
      if (!Array.isArray(raw) || !raw.length) return [{ label: "Mosmori 评分", value: "已完成" }];
      return raw.slice(0, 4).map((factor) => ({
        label: factor.label || factor.dimension || "维度",
        value: factor.value ?? (factor.score !== undefined ? `${factor.score}/${factor.max || 5}` : factor.delta ?? ""),
        reason: factor.reason || "",
      }));
    }

    function sparkScreeningSignals(item) {
      const text = item.content || item.media_url || "";
      const factors = [];
      if (text.length >= 12) factors.push({ label: "信息量", value: "够初筛" });
      if (/为什么|怎么|如何|反差|误区|复盘|趋势|普通人|新手/.test(text)) {
        factors.push({ label: "问题", value: "较明确" });
      }
      if (/不要|总是|卡|失败|半途/.test(text)) {
        factors.push({ label: "痛点", value: "可感知" });
      }
      if (item.tags?.length) {
        factors.push({ label: "标签", value: `${item.tags.length} 个` });
      }
      if (item.sync_status === "processed") {
        factors.push({ label: "状态", value: "已处理" });
      }
      if (text.length < 12) {
        factors.push({ label: "信息量", value: "不足" });
      }
      return (factors.length ? factors : [{ label: "初筛", value: "待补信息" }]).slice(0, 4);
    }

    function scoreFactorText(factor) {
      if (factor.value === "" || factor.value === undefined || factor.value === null) return factor.label;
      const value = typeof factor.value === "number" && factor.value > 0 ? `+${factor.value}` : factor.value;
      return `${factor.label} ${value}`;
    }

    async function loadInbox() {
      const data = await api("/api/inbox");
      inboxItems = data.items || [];
      renderSparkBoard();
      renderMaterialList();
    }

    function sparkItems() {
      const actionable = inboxItems.filter((item) => item.sync_status !== "processed");
      return [...localSparks, ...actionable].sort(compareSparkItems).slice(0, 18);
    }

    function compareSparkItems(a, b) {
      const aScore = sparkScore(a)?.value ?? -1;
      const bScore = sparkScore(b)?.value ?? -1;
      if (aScore !== bScore) return bScore - aScore;
      const aTime = a.scored_at || a.created_at || "";
      const bTime = b.scored_at || b.created_at || "";
      return String(bTime).localeCompare(String(aTime));
    }

    function sparkKey(item) {
      return item.id || item.content || item.media_url || "";
    }

    function renderSparkBoard() {
      const board = $("sparkBoard");
      const items = sparkItems();
      $("sparkCount").textContent = `${items.length} 条`;
      board.innerHTML = "";
      if (!items.length) {
        board.innerHTML = `<p class="muted">还没有待处理火花。直接在中间对话里输入灵感即可。</p>`;
        return;
      }
      items.forEach((item, index) => {
        const content = item.content || item.media_url || "(empty)";
        const evaluation = sparkEvaluation(item);
        const key = sparkKey(item);
        const isScoring = scoringSparkIds.has(key);
        const isExpanded = expandedSparkIds.has(key);
        const node = document.createElement("div");
        node.className = `spark-card ${isExpanded ? "expanded" : ""} ${selectedMaterial === content ? "active" : ""} ${activeOutputContext?.sparkKey === key ? "active" : ""}`;
        node.title = [evaluation.title, ...evaluation.factors.map(scoreFactorText)].join(" / ");
        node.innerHTML = `
          <div class="score-row">
            <div class="spark-source">
              <span class="rank-badge">#${index + 1}</span>
              <span class="tiny">${escapeHtml(item.source || typeLabel(item.type))}</span>
            </div>
            <button class="score-pill ${evaluation.state === "pending" ? "pending" : ""}" type="button" data-score-spark ${isScoring ? "disabled" : ""}>${escapeHtml(isScoring ? "评分中" : evaluation.label)}</button>
          </div>
          <div class="spark-title">${escapeHtml(content)}</div>
          <button class="secondary detail-toggle" type="button" data-toggle-details>${isExpanded ? "收起详情" : "详情"}</button>
          <div class="spark-details">
            <div class="score-source-note">${escapeHtml(evaluation.sourceLabel)}</div>
            <div class="score-breakdown">
              ${evaluation.factors.map((factor) => `<span class="score-factor">${escapeHtml(scoreFactorText(factor))}</span>`).join("")}
            </div>
            ${titleOptionsHtml(item)}
          </div>
        `;
        node.querySelector("[data-score-spark]").addEventListener("click", async (event) => {
          event.stopPropagation();
          await mosmoriScoreSpark(item, item.selected_title || "");
        });
        node.querySelector("[data-toggle-details]").addEventListener("click", (event) => {
          event.stopPropagation();
          if (expandedSparkIds.has(key)) {
            expandedSparkIds.delete(key);
          } else {
            expandedSparkIds.add(key);
          }
          renderSparkBoard();
        });
        node.querySelectorAll("[data-title-index]").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            const title = item.title_candidates[Number(button.dataset.titleIndex)];
            await mosmoriScoreSpark(item, title);
          });
        });
        node.addEventListener("click", () => {
          focusOutputsForSpark(item);
          selectMaterial(content, "spark");
        });
        board.appendChild(node);
      });
    }

    function focusOutputsForSpark(item, options = {}) {
      const content = item.content || item.media_url || "";
      activeOutputContext = {
        mode: options.demo ? "demo" : "spark",
        demo: Boolean(options.demo || item.demo || content === DEMO_TOPIC),
        sparkKey: sparkKey(item),
        inboxId: item.id || "",
        topic: item.flow_topic || content,
        flowId: item.flow_id || flowIdForTopic(content),
      };
      renderOutputBoard();
    }

    function titleOptionsHtml(item) {
      if (!Array.isArray(item.title_candidates) || !item.title_candidates.length) return "";
      return `
        <div class="title-options">
          ${item.title_candidates.map((title, index) => `
            <button class="title-option ${title === item.selected_title ? "active" : ""}" type="button" data-title-index="${index}">
              ${escapeHtml(title)}
            </button>
          `).join("")}
        </div>
      `;
    }

    async function mosmoriScoreSpark(item, selectedTitle = "") {
      const key = sparkKey(item);
      if (scoringSparkIds.has(key)) return;
      scoringSparkIds.add(key);
      renderSparkBoard();
      const content = item.content || item.media_url || "";
      try {
        const result = await api("/api/spark/score", {
          method: "POST",
          body: JSON.stringify({
            id: item.id || "",
            content,
            media_url: item.media_url || "",
            type: item.type || "text",
            tags: item.tags || [],
            selected_title: selectedTitle,
            demo: Boolean(item.demo),
            flow_topic: item.flow_topic || content,
            flow_id: item.flow_id || flowIdForTopic(content)
          })
        });
        localSparks = localSparks.filter((spark) => sparkKey(spark) !== key && spark.content !== result.item.content);
        inboxItems = [result.item, ...inboxItems.filter((spark) => spark.id !== result.item.id)];
        expandedSparkIds.add(sparkKey(result.item));
        focusOutputsForSpark(result.item, { demo: result.item.demo });
        await loadInbox();
        await loadFiles();
        renderSparkBoard();
        showToast(`评分完成：${scoreValueOf(result.item)} 分`);
        addMessage("agent", formatSparkScore(result.item), [{ label: "继续：审核", prompt: `审核这个灵感：${result.item.content || result.item.media_url}` }]);
      } catch (error) {
        setStatus(`评分失败：${error.message}`, false);
      } finally {
        scoringSparkIds.delete(key);
        renderSparkBoard();
      }
    }

    function formatSparkScore(item) {
      const dims = (item.score_breakdown || []).slice(0, 4).map((dim) => `- ${dim.label}：${dim.score}/${dim.max || 5}，${dim.reason}`).join("\n");
      return `火花评分完成：${scoreValueOf(item)} 分\n选用标题：${item.selected_title || "未记录"}\n\n${dims}`;
    }

    async function runDemoFlow() {
      if (demoRunning) return;
      demoRunning = true;
      const demoButton = $("runDemoFlow");
      demoButton.disabled = true;
      demoButton.textContent = "演示生成中...";
      hideStarterHints();
      const topic = DEMO_TOPIC;
      const flowId = `demo-${Date.now().toString(36)}`;
      demoView = true;
      activeOutputContext = { mode: "demo", demo: true, sparkKey: "", inboxId: "", topic, flowId };
      renderOutputBoard();
      showToast("开始生成演示流");
      try {
        addMessage("user", `演示流：${topic}`);
        const inbox = await api("/api/inbox", {
          method: "POST",
          body: JSON.stringify({ type: "text", content: topic, tags: ["演示", "个人IP"], sync_status: "pulled", demo: true, flow_topic: topic, flow_id: flowId })
        });
        activeOutputContext.inboxId = inbox.item.id;
        activeOutputContext.sparkKey = sparkKey(inbox.item);
        await runDemoStep(`固化这个灵感：${topic}`);
        const scoreResult = await api("/api/spark/score", {
          method: "POST",
          body: JSON.stringify({ id: inbox.item.id, content: topic, demo: true, flow_topic: topic, flow_id: flowId })
        });
        activeOutputContext.inboxId = scoreResult.item.id;
        activeOutputContext.sparkKey = sparkKey(scoreResult.item);
        addMessage("agent", formatSparkScore(scoreResult.item), [{ label: "继续：审核", prompt: `审核这个灵感：${topic}` }]);
        await runDemoStep(`审核这个灵感：${topic}`);
        await runDemoStep(`写视频脚本：${topic}`);
        await runDemoStep(`发布文案：${topic}`);
        await runDemoStep(`生成静态页文案：${topic}`);
        await loadInbox();
        await loadFiles();
        renderOutputBoard();
        addMessage("agent", "演示样本已生成：左侧有评分火花榜，右侧只显示本次演示链路产物，可以直接打开、复制或继续生成。");
        showToast("演示流已生成");
      } catch (error) {
        setStatus(`演示流失败：${error.message}`, false);
      } finally {
        demoRunning = false;
        demoButton.disabled = false;
        demoButton.textContent = "演示模式";
      }
    }

    async function runDemoStep(message) {
      addMessage("user", message);
      const reply = await api("/api/chat", {
        method: "POST",
        body: JSON.stringify({
          message,
          force_local: true,
          demo: true,
          inbox_id: activeOutputContext?.inboxId || "",
          flow_topic: activeOutputContext?.topic || DEMO_TOPIC,
          flow_id: activeOutputContext?.flowId || flowIdForTopic(DEMO_TOPIC)
        })
      });
      addMessage("agent", formatReply(reply), replyActions(reply));
      return reply;
    }

    async function resetDemoFlow() {
      const resetButton = $("resetDemoFlow");
      resetButton.disabled = true;
      resetButton.textContent = "清理中...";
      try {
        const result = await api("/api/demo/reset", { method: "POST", body: JSON.stringify({}) });
        localSparks = localSparks.filter((item) => !item.demo && item.content !== DEMO_TOPIC);
        demoView = false;
        activeOutputContext = null;
        expandedSparkIds.clear();
        await loadInbox();
        await loadFiles();
        addMessage("agent", `演示数据已清理：只移除带演示标记的数据，共 ${result.removed_inbox} 条火花、${result.removed_deliverable_dirs} 组产物。普通历史产物已保留。`);
        showToast("只清理了演示数据");
      } catch (error) {
        setStatus(`清理演示失败：${error.message}`, false);
      } finally {
        resetButton.disabled = false;
        resetButton.textContent = "清理演示";
      }
    }

    function renderMaterialList() {
      const list = $("materialList");
      list.innerHTML = "";
      renderSelectedMaterial();
      let items = [];
      if (materialTab === "inbox") {
        items = inboxItems.filter((item) => item.sync_status !== "processed").map((item) => ({
          label: typeLabel(item.type),
          content: item.content || item.media_url || "(empty)",
          note: statusLabel(item.sync_status)
        }));
      } else if (materialTab === "mobile") {
        items = [
          { label: "手机同步", content: "拉取手机里新提交的灵感", action: pullCloud },
          { label: "同步地址", content: appConfig.cloud?.base_url || "尚未设置手机同步地址", action: openSettings }
        ];
      } else {
        const seenFiles = new Set();
        Object.entries(fileGroups).forEach(([group, files]) => {
          contentFiles(files).forEach((file) => {
            const meta = fileMeta(file);
            const key = `${meta.type}:${meta.name}`;
            if (seenFiles.has(key) || seenFiles.size >= 12) return;
            seenFiles.add(key);
            items.push({
              label: meta.type,
              content: `${meta.type}：${meta.name}`,
              note: groupLabel(group),
              path: file.path
            });
          });
        });
      }
      if (!items.length) {
        list.innerHTML = `<p class="muted">暂无可选素材。</p>`;
        return;
      }
      items.forEach((item) => {
        const node = document.createElement("div");
        node.className = `material-card ${selectedMaterial === item.content ? "active" : ""}`;
        node.innerHTML = `
          <div class="tiny">${escapeHtml(item.label)}${item.note ? " · " + escapeHtml(item.note) : ""}</div>
          <div class="material-title">${escapeHtml(item.content)}</div>
        `;
        node.addEventListener("click", async () => {
          if (item.action) {
            await item.action();
          } else if (item.path) {
            await continueFromFile(item.path, item.label, item.content);
          } else {
            selectMaterial(item.content, item.label);
          }
        });
        list.appendChild(node);
      });
    }

    function selectMaterial(content, label, display = "") {
      if (selectedMaterial === content) {
        clearSelectedMaterial();
        return;
      }
      selectedMaterial = content;
      selectedMaterialLabel = label;
      selectedMaterialDisplay = display || content;
      selectedMaterialPrompt = `${label === "spark" ? "固化这个灵感" : "基于这个素材继续"}：`;
      $("chatInput").value = selectedMaterialPrompt;
      $("chatInput").focus();
      updateComposerState();
      renderSparkBoard();
      renderMaterialList();
      showToast("已添加素材标签");
    }

    function composeChatMessage(rawMessage) {
      if (!selectedMaterial) return rawMessage;
      const label = selectedMaterialLabel === "spark" ? "火花" : selectedMaterialLabel || "素材";
      const prompt = rawMessage || "基于这个素材继续：";
      return `${prompt}\n\n${label}：${selectedMaterial}`;
    }

    function renderSelectedMaterial() {
      const chip = $("chatMaterialChip");
      if (!selectedMaterial) {
        chip.hidden = true;
        $("chatMaterialTitle").textContent = "";
        return;
      }
      chip.hidden = false;
      const label = selectedMaterialLabel === "spark" ? "火花" : selectedMaterialLabel;
      const display = selectedMaterialDisplay || selectedMaterial;
      $("chatMaterialTitle").textContent = display.startsWith(`${label}：`) ? display : `${label}：${display}`;
    }

    function clearSelectedMaterial(options = {}) {
      if (!selectedMaterial) return;
      const { clearInput = true, quiet = false } = options;
      if (clearInput && $("chatInput").value === selectedMaterialPrompt) {
        $("chatInput").value = "";
      }
      selectedMaterial = "";
      selectedMaterialLabel = "";
      selectedMaterialDisplay = "";
      selectedMaterialPrompt = "";
      updateComposerState();
      renderSparkBoard();
      renderMaterialList();
      if (!quiet) showToast("已删除素材标签");
    }

    async function loadFiles() {
      const data = await api("/api/files");
      fileGroups = data.groups || {};
      renderOutputBoard();
      if (materialTab === "files") renderMaterialList();
    }

    function contentFiles(files) {
      return (files || []).filter((file) => {
        const name = (file.name || "").toLowerCase();
        return name && name !== "manifest.json" && name !== "inbox.jsonl";
      });
    }

    function fileMeta(file) {
      const name = file.name || "未命名文件";
      const lower = name.toLowerCase();
      const type = [
        [/init-state/, "初始化档案"],
        [/status-report/, "状态看板"],
        [/trend-candidates/, "热点候选"],
        [/topic-recommendation/, "选题推荐"],
        [/benchmark-analysis/, "对标分析"],
        [/overlay-card/, "金句卡/Overlay"],
        [/good-article-analysis/, "好文分析"],
        [/spark|card|idea|brief/, "灵感固化卡"],
        [/seed-draft/, "选题深挖稿"],
        [/douyin-review/, "抖音审稿"],
        [/hook-review/, "开头优化"],
        [/review|audit|score|topic|analysis/, "审核结果"],
        [/prediction|predict/, "发布预测"],
        [/video|script|speaking|storyboard/, "视频脚本"],
        [/humanized-copy/, "去AI味改写"],
        [/shoot-record/, "拍摄登记"],
        [/publish-record|publish_record/, "发布登记"],
        [/retro|review-after|postmortem/, "复盘结果"],
        [/persona-report/, "受众画像"],
        [/score-rules-bump/, "评分规则升级建议"],
        [/migration-report/, "迁移检查"],
        [/promotion-plan/, "投流决策"],
        [/publish|copy|title|text/, "发布文案"],
        [/static|page/, "静态页文案"],
      ].find(([pattern]) => pattern.test(lower))?.[1] || groupLabel(file.group || "");
      return { name, type, modifiedAt: file.modified_at || "" };
    }

    function flowIdForTopic(topic) {
      let hash = 0;
      const text = String(topic || "");
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) | 0;
      }
      return Math.abs(hash).toString(16).padStart(8, "0").slice(0, 12);
    }

    function manifestSource(file) {
      return file.manifest?.source || {};
    }

    function isDemoFile(file) {
      const manifest = file.manifest || {};
      const source = manifestSource(file);
      return Boolean(source.demo) || manifest.topic === DEMO_TOPIC || String(manifest.request || "").includes(DEMO_TOPIC);
    }

    function fileMatchesContext(file, context) {
      if (!context) return true;
      const manifest = file.manifest || {};
      const source = manifestSource(file);
      if (context.demo) {
        if (!isDemoFile(file)) return false;
        if (context.flowId && source.flow_id === context.flowId) return true;
        if (context.inboxId && source.inbox_id === context.inboxId) return true;
        return false;
      }
      if (context.flowId && source.flow_id === context.flowId) return true;
      if (context.inboxId && source.inbox_id === context.inboxId) return true;
      if (context.topic && (source.flow_topic === context.topic || manifest.topic === context.topic || String(manifest.request || "").includes(context.topic))) return true;
      return false;
    }

    function groupLabel(group) {
      return {
        deliverables: "生成产物",
        scripts: "脚本库",
        predictions: "预测库",
        archive: "灵感归档"
      }[group] || "文件";
    }

    function renderOutputBoard() {
      const board = $("outputBoard");
      board.innerHTML = "";
      const cards = outputCards();
      renderOutputScope(cards);
      if (!cards.length) {
        const emptyText = activeOutputContext
          ? "当前链路暂无产出。继续完成审核、脚本或发布文案后会出现在这里。"
          : "暂无产出。完成一次固化、审核或脚本后会出现在这里。";
        board.innerHTML = `<p class="muted">${emptyText}</p>`;
        return;
      }
      cards.forEach((card) => {
        const node = document.createElement("div");
        node.className = "output-card";
        const latest = card.files[0];
        const rows = card.files.slice(0, 3).map((file) => {
          const meta = fileMeta(file);
          return `<div class="output-file"><span>${escapeHtml(meta.name)}</span><span class="tiny">${escapeHtml(meta.modifiedAt.slice(5, 16).replace("T", " "))}</span></div>`;
        }).join("");
        node.innerHTML = `
          <div class="output-meta">
            <div class="output-title">${escapeHtml(card.type)}</div>
            <span class="pill">${card.files.length} 个</span>
          </div>
          <div class="tiny">${escapeHtml(card.note)}</div>
          <div class="output-files">${rows}</div>
          <div class="output-actions"></div>
        `;
        const actions = node.querySelector(".output-actions");
        const actionItems = [
          { label: "打开", handler: () => openOutputFile(latest.path) },
          { label: "复制", handler: () => copyOutputFile(latest.path) },
          { label: "继续生成", handler: () => continueFromFile(latest.path, card.type, `${card.type}：${latest.name}`) }
        ];
        if (card.type === "发布预测") {
          actionItems.push({ label: "登记发布", handler: () => registerPublishFromFile(latest) });
        }
        if (card.type === "发布登记") {
          actionItems.push({ label: "生成复盘", handler: () => generateRetroFromFile(latest) });
        }
        actionItems.forEach((action) => {
          const button = document.createElement("button");
          button.className = "secondary";
          button.type = "button";
          button.textContent = action.label;
          button.addEventListener("click", action.handler);
          actions.appendChild(button);
        });
        board.appendChild(node);
      });
    }

    function renderOutputScope(cards = []) {
      const scope = $("outputScopeText");
      if (!scope) return;
      if (activeOutputContext?.demo) {
        scope.textContent = cards.length ? "演示视图：只显示本次样本链路产物。" : "演示视图：等待生成本次样本产物。";
      } else if (activeOutputContext) {
        scope.textContent = "当前火花链路：优先显示与所选火花相关的产物。";
      } else {
        scope.textContent = "全局视图：显示最新产物。";
      }
    }

    async function readOutputFile(path) {
      return api("/api/file/read", { method: "POST", body: JSON.stringify({ path }) });
    }

    async function openOutputFile(path) {
      await api("/api/file/open", { method: "POST", body: JSON.stringify({ path }) });
      showToast("已打开产物文件");
    }

    async function copyOutputFile(path) {
      const result = await readOutputFile(path);
      await copyText(result.content || "");
      showToast("已复制产物内容");
    }

    async function continueFromFile(path, label, display) {
      const result = await readOutputFile(path);
      selectMaterial(result.content || display, label, display);
      showToast("已把产物放入对话");
    }

    function outputContextPayload(file) {
      const manifest = file.manifest || {};
      const source = manifestSource(file);
      const topic = source.flow_topic || manifest.topic || activeOutputContext?.topic || "";
      return {
        flow_id: source.flow_id || activeOutputContext?.flowId || flowIdForTopic(topic),
        topic,
      };
    }

    async function registerPublishFromFile(file) {
      const context = outputContextPayload(file);
      const url = window.prompt("发布链接（可先留空）", "");
      if (url === null) return;
      const platform = window.prompt("发布平台", "douyin");
      if (platform === null) return;
      const notes = window.prompt("发布备注", "") || "";
      await api("/api/workflow/publish", {
        method: "POST",
        body: JSON.stringify({
          ...context,
          url,
          platform: platform || "douyin",
          notes,
        }),
      });
      await loadFiles();
      showToast("发布登记已生成");
    }

    function parseRetroMetrics(raw) {
      const values = String(raw || "").split(/[,，\s]+/).map((item) => Number.parseInt(item, 10) || 0);
      return {
        views: values[0] || 0,
        likes: values[1] || 0,
        comments: values[2] || 0,
        saves: values[3] || 0,
        shares: values[4] || 0,
      };
    }

    async function generateRetroFromFile(file) {
      const context = outputContextPayload(file);
      const raw = window.prompt("输入数据：播放 点赞 评论 收藏 分享", "0 0 0 0 0");
      if (raw === null) return;
      const notes = window.prompt("复盘备注", "") || "";
      await api("/api/workflow/retro", {
        method: "POST",
        body: JSON.stringify({
          ...context,
          metrics: parseRetroMetrics(raw),
          notes,
        }),
      });
      await loadFiles();
      showToast("复盘结果已生成");
    }

    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      temp.remove();
    }

    function outputCards() {
      const buckets = new Map();
      OUTPUT_TYPES.forEach((type) => buckets.set(type, []));
      Object.entries(fileGroups).forEach(([group, files]) => {
        contentFiles(files).forEach((file) => {
          const enriched = { ...file, group };
          if (!fileMatchesContext(enriched, activeOutputContext)) return;
          const meta = fileMeta(enriched);
          if (!OUTPUT_TYPES.includes(meta.type)) return;
          buckets.get(meta.type).push(enriched);
        });
      });
      return Array.from(buckets.entries()).filter(([, files]) => files.length).map(([type, files]) => ({
        type,
        files: files.sort((a, b) => String(b.modified_at || "").localeCompare(String(a.modified_at || ""))),
        note: outputNote(type)
      })).sort((a, b) => outputRank(a.type) - outputRank(b.type));
    }

    function outputRank(type) {
      const index = OUTPUT_TYPES.indexOf(type);
      return index === -1 ? 99 : index;
    }

    function outputNote(type) {
      return {
        "灵感固化卡": "可作为下一轮脚本或审核的起点",
        "初始化档案": "记录首次配置和下一步",
        "状态看板": "查看火花、评分、发布和复盘进度",
        "热点候选": "没有素材时的候选池入口",
        "选题推荐": "从候选池或火花榜挑下一条",
        "对标分析": "拆对标账号/内容的可迁移结构",
        "选题深挖稿": "围绕一个火花深挖角度和大纲",
        "审核结果": "判断值不值得做，并保留风险与改法",
        "抖音审稿": "检查限流红线和发布前风险",
        "开头优化": "优化前 3 秒钩子",
        "发布预测": "发布前的判断已锁定，可登记真实发布",
        "视频脚本": "可继续生成分镜、口播或剪辑方案",
        "去AI味改写": "把模板腔改成更像真人表达",
        "金句卡/Overlay": "露脸同屏或切卡素材",
        "发布文案": "标题、简介和平台发布文案",
        "静态页文案": "适合沉淀成长文或展示页",
        "拍摄登记": "记录已拍摄和是否需要预测 v2",
        "发布登记": "记录真实链接和发布时间，可生成复盘",
        "复盘结果": "把发布数据反写为下一轮判断",
        "受众画像": "从复盘和评论派生观众画像",
        "评分规则升级建议": "判断是否需要调整评分公式",
        "迁移检查": "检查旧状态文件升级路径",
        "投流决策": "按数据判断是否投放",
        "好文分析": "沉淀外部好文的观点、金句和结构"
      }[type] || "可继续放入对话生成下一步";
    }

    async function pullCloud() {
      const result = await api("/api/sync/inspirations", {
        method: "POST",
        body: JSON.stringify({})
      });
      await loadInbox();
      await loadFiles();
      showToast(result.note || `已拉取 ${result.pulled} 条云端灵感`);
    }

    async function activateLicense() {
      const token = $("licenseToken").value.trim();
      if (!token) return;
      await api("/api/license/activate", { method: "POST", body: JSON.stringify({ token }) });
      $("licenseToken").value = "";
      await loadConfig();
      showToast("授权已写入本地");
    }

    async function testModel() {
      await saveConfig();
      try {
        const result = await api("/api/llm/test", { method: "POST", body: JSON.stringify({}) });
        showToast(`模型测试成功：${result.reply || result.note}`);
      } catch (error) {
        setStatus(`模型测试失败：${error.message}`, false);
      }
    }

    async function linkDevice() {
      const cloudBase = $("cloudBase").value.trim();
      if (!cloudBase) {
        setStatus("先填写手机同步地址", false);
        return;
      }
      await saveConfig();
      const result = await api("/api/cloud/link-device", {
        method: "POST",
        body: JSON.stringify({ device_name: "desktop-workbench" })
      });
      await loadConfig();
      showToast(`已绑定设备：${result.device.device_id}`);
    }

    function openSettings() {
      $("settingsBackdrop").hidden = false;
    }

    function closeSettings() {
      $("settingsBackdrop").hidden = true;
    }

    function applyTheme(theme, options = {}) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = nextTheme;
      $("toggleTheme").textContent = nextTheme === "dark" ? "☼" : "◐";
      $("toggleTheme").title = nextTheme === "dark" ? "切换明亮主题" : "切换暗夜主题";
      $("toggleTheme").setAttribute("aria-label", $("toggleTheme").title);
      localStorage.setItem("mosmori:theme", nextTheme);
      if (!options.quiet) showToast(nextTheme === "dark" ? "暗夜主题已启用" : "明亮主题已启用");
    }

    function toggleTheme() {
      applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    }

    function setRailCollapsed(kind, collapsed, options = {}) {
      const isSpark = kind === "spark";
      const column = $(isSpark ? "sparkColumn" : "materialColumn");
      const toggle = $(isSpark ? "toggleSparkPanel" : "toggleMaterialPanel");
      const workspaceClass = isSpark ? "spark-collapsed" : "material-collapsed";
      column.classList.toggle("collapsed", collapsed);
      $("workspace").classList.toggle(workspaceClass, collapsed);
      toggle.textContent = collapsed ? "展开" : "收起";
      toggle.setAttribute("aria-expanded", String(!collapsed));
      localStorage.setItem(`mosmori:${kind}Collapsed`, String(collapsed));
      if (!options.quiet) showToast(`${isSpark ? "火花栏" : "素材栏"}已${collapsed ? "收起" : "展开"}`);
    }

    function setSectionCollapsed(section, collapsed, options = {}) {
      const isMaterial = section === "material";
      const panel = $(isMaterial ? "materialPanel" : "outputPanel");
      const toggle = $(isMaterial ? "toggleMaterialSection" : "toggleOutputSection");
      panel.classList.toggle("section-collapsed", collapsed);
      toggle.textContent = collapsed ? "展开" : "折叠";
      toggle.setAttribute("aria-expanded", String(!collapsed));
      localStorage.setItem(`mosmori:${section}SectionCollapsed`, String(collapsed));
      if (!options.quiet) showToast(`${isMaterial ? "素材选择" : "产出看板"}已${collapsed ? "折叠" : "展开"}`);
    }

    function restoreCollapsedState() {
      applyTheme(localStorage.getItem("mosmori:theme") || "light", { quiet: true });
      setRailCollapsed("spark", localStorage.getItem("mosmori:sparkCollapsed") === "true", { quiet: true });
      setRailCollapsed("material", localStorage.getItem("mosmori:materialCollapsed") === "true", { quiet: true });
      setSectionCollapsed("material", localStorage.getItem("mosmori:materialSectionCollapsed") === "true", { quiet: true });
      setSectionCollapsed("output", localStorage.getItem("mosmori:outputSectionCollapsed") === "true", { quiet: true });
    }

    function typeLabel(type) {
      return {
        text: "文字灵感",
        voice: "语音灵感",
        image: "图片灵感",
        link: "链接灵感",
        video_link: "短视频链接"
      }[type] || "灵感";
    }

    function statusLabel(status) {
      return {
        pending: "待同步",
        pulled: "待处理",
        archived: "待处理",
        processed: "已处理",
        local: "本次输入"
      }[status] || "待处理";
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    document.querySelectorAll("[data-material-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-material-tab]").forEach((x) => x.classList.remove("active"));
        button.classList.add("active");
        materialTab = button.dataset.materialTab;
        renderMaterialList();
      });
    });

    document.querySelectorAll("[data-prompt]").forEach((button) => {
      button.addEventListener("click", () => {
        hideStarterHints();
        $("chatInput").value = button.dataset.prompt;
        $("chatInput").focus();
        updateComposerState();
      });
    });
    $("runDemoFlow").addEventListener("click", runDemoFlow);
    $("resetDemoFlow").addEventListener("click", resetDemoFlow);
    $("toggleTheme").addEventListener("click", toggleTheme);

    $("sendChat").addEventListener("click", () => sendChat());
    $("chatInput").addEventListener("focus", () => {
      composerFocused = true;
      updateComposerState();
    });
    $("chatInput").addEventListener("blur", () => {
      window.setTimeout(() => {
        composerFocused = false;
        updateComposerState();
      }, 120);
    });
    $("chatInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) sendChat();
    });
    $("chatInput").addEventListener("input", () => {
      if (selectedMaterial && !$("chatInput").value.trim()) {
        clearSelectedMaterial({ clearInput: false, quiet: true });
      }
      updateComposerState();
    });
    $("chatLog").addEventListener("scroll", () => {
      if (!composerFocused && !$("chatInput").value.trim() && !selectedMaterial) {
        updateComposerState({ forceCompact: true });
      }
    });
    $("refreshAll").addEventListener("click", async () => {
      await loadStatus();
      await loadConfig();
      await loadInbox();
      await loadFiles();
    });
    $("openSettings").addEventListener("click", openSettings);
    $("closeSettings").addEventListener("click", closeSettings);
    $("clearSelectedMaterial").addEventListener("click", () => clearSelectedMaterial());
    $("toggleSparkPanel").addEventListener("click", () => setRailCollapsed("spark", true));
    $("expandSparkPanel").addEventListener("click", () => setRailCollapsed("spark", false));
    $("toggleMaterialPanel").addEventListener("click", () => setRailCollapsed("material", true));
    $("expandMaterialPanel").addEventListener("click", () => setRailCollapsed("material", false));
    $("toggleMaterialSection").addEventListener("click", () => setSectionCollapsed("material", !$("materialPanel").classList.contains("section-collapsed")));
    $("toggleOutputSection").addEventListener("click", () => setSectionCollapsed("output", !$("outputPanel").classList.contains("section-collapsed")));
    $("settingsBackdrop").addEventListener("click", (event) => {
      if (event.target.id === "settingsBackdrop") closeSettings();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !$("settingsBackdrop").hidden) closeSettings();
    });
    $("saveConfig").addEventListener("click", saveConfig);
    $("testModel").addEventListener("click", testModel);
    $("activateLicense").addEventListener("click", activateLicense);
    $("linkDevice").addEventListener("click", linkDevice);
    $("loadFiles").addEventListener("click", loadFiles);
    $("pullCloud").addEventListener("click", pullCloud);
    restoreCollapsedState();

    (async function init() {
      try {
        await loadStatus();
        await loadConfig();
        await loadInbox();
        await loadFiles();
        addMessage("agent", "我已经准备好了。直接输入灵感，也可以把内容形态、平台、赛道、人设一起写在对话里。左侧会自动形成火花看板，右侧可以选择素材进入对话。");
        updateComposerState();
      } catch (error) {
        setStatus(error.message, false);
      }
    })();
  </script>
</body>
</html>
