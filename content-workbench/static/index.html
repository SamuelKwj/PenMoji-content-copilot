<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>灵感到脚本</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e7f5f2'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' font-family='Arial' fill='%230f766e'%3E%E5%86%99%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242b;
      --muted: #667085;
      --line: #d8dde6;
      --accent: #0f766e;
      --accent-2: #334155;
      --warn: #a16207;
      --good: #166534;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }
    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      grid-template-areas: "settings main";
      min-height: 100vh;
    }
    aside {
      grid-area: settings;
      border-right: 1px solid var(--line);
      background: #eef2f6;
      padding: 16px;
      overflow: auto;
    }
    main {
      grid-area: main;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }
    header {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 0 18px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 18px; font-weight: 650; }
    h2 { font-size: 14px; margin-bottom: 10px; }
    h3 { font-size: 13px; margin-bottom: 8px; color: var(--accent-2); }
    .muted { color: var(--muted); font-size: 12px; }
    .section {
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }
    .section:first-child { padding-top: 0; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 5px;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 9px;
      font: inherit;
      font-size: 13px;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
    }
    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--accent-2);
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(360px, 1.1fr) minmax(320px, .9fr);
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .panel-body {
      padding: 14px;
      overflow: auto;
      min-height: 0;
    }
    .chat-log {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .message.user {
      border-color: #9ccbc6;
      background: #effaf8;
    }
    .message.agent {
      border-color: #cbd5e1;
      background: #f8fafc;
    }
    .message-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .message-actions button {
      min-height: 30px;
      padding: 6px 9px;
      font-size: 12px;
    }
    .chat-input {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      background: #fbfcfd;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      background: #fff;
    }
    .status-ok { color: var(--good); }
    .status-warn { color: var(--warn); }
    [hidden] { display: none !important; }
    pre {
      margin: 0;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: #e5e7eb;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 9px;
      font-size: 13px;
    }
    .item-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .item-actions button {
      min-height: 28px;
      padding: 5px 8px;
      font-size: 12px;
    }
    .item-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tabs button {
      background: #fff;
      border-color: var(--line);
      color: var(--accent-2);
    }
    .tabs button.active {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }
    @media (max-width: 920px) {
      .app { display: flex; flex-direction: column; }
      main { order: 1; }
      aside { order: 2; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      .content { grid-template-columns: 1fr; }
      header { height: auto; min-height: 58px; align-items: flex-start; flex-direction: column; padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="section">
        <h1>灵感到脚本</h1>
        <p class="muted" id="statusText">连接中</p>
      </div>

      <div class="section">
        <h2>基础设置</h2>
        <label for="apiBase">API Base URL</label>
        <input id="apiBase" autocomplete="off">
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" autocomplete="off">
        <label for="model">Model</label>
        <input id="model" autocomplete="off">
        <label for="projectPath">产物保存位置</label>
        <input id="projectPath" autocomplete="off">
        <label for="cloudBase">手机同步地址</label>
        <input id="cloudBase" placeholder="http://127.0.0.1:8787" autocomplete="off">
        <div style="height:10px"></div>
        <button class="secondary" id="linkDevice">绑定本机</button>
        <div class="grid">
          <div>
            <label for="contentType">内容形态</label>
            <input id="contentType" placeholder="口播/图文/播客">
          </div>
          <div>
            <label for="platform">平台</label>
            <input id="platform" placeholder="douyin">
          </div>
        </div>
        <label for="niche">赛道/人设</label>
        <input id="niche" placeholder="例如：商业诊断、个人IP">
        <div style="height:10px"></div>
        <button id="saveConfig">保存配置</button>
        <button class="secondary" id="testModel">测试模型</button>
      </div>

      <div class="section">
        <h2>授权</h2>
        <p class="muted" id="licenseText">读取中</p>
        <label for="licenseToken">License Token</label>
        <input id="licenseToken" type="password" autocomplete="off">
        <div style="height:10px"></div>
        <button class="secondary" id="activateLicense">激活</button>
      </div>
    </aside>

    <main>
      <header>
        <div>
          <h1>脚本工作流助手</h1>
          <p class="muted">灵感固化 -> 审核 -> 评分 -> 预测 -> 视频脚本 -> 静态页文字。</p>
        </div>
        <div class="row">
          <span class="pill" id="versionPill">v0.1.0</span>
          <button class="secondary" id="refreshAll">刷新</button>
        </div>
      </header>

      <div class="content">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>引导流程</h2>
              <p class="muted">先丢一个灵感，我会按流程一步一步带你走。</p>
            </div>
          </div>
          <div class="panel-body chat-log" id="chatLog"></div>
          <div class="chat-input">
            <textarea id="chatInput" placeholder="输入一个灵感火花，例如：普通人为什么做个人IP总是半途而废"></textarea>
            <button id="sendChat">发送</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>素材与产物</h2>
              <p class="muted">手机灵感、同步状态和已生成文件。</p>
            </div>
            <div class="tabs">
              <button class="active" data-tab="inbox">灵感</button>
              <button data-tab="sync">手机同步</button>
              <button data-tab="files">产物</button>
            </div>
          </div>
          <div class="panel-body">
            <div id="tab-inbox" class="stack">
              <div class="row">
                <button class="secondary" id="loadInbox">刷新灵感</button>
              </div>
              <div class="list" id="inboxList"></div>
            </div>

            <div id="tab-sync" class="stack" hidden>
              <h3>手机灵感同步</h3>
              <button class="secondary" id="pullCloud">同步手机灵感</button>
              <label for="syncContent">灵感内容</label>
              <textarea id="syncContent" placeholder="手机里随手记下的一条灵感"></textarea>
              <label for="syncTags">标签，逗号分隔</label>
              <input id="syncTags" placeholder="选题,个人IP">
              <button id="syncOne">加入电脑灵感箱</button>
            </div>

            <div id="tab-files" class="stack" hidden>
              <div class="row">
                <button class="secondary" id="loadFiles">刷新产物</button>
              </div>
              <div class="list" id="fileList"></div>
            </div>

            <div id="tab-debug" class="stack" hidden>
              <pre id="debugOutput">{}</pre>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let appConfig = {};
    const STAGE_LABELS = {
      spark_solidify: "灵感固化",
      guided_workflow: "从第一步开始",
      on_demand_production: "当前步骤",
      deliverable_selection: "选择下一步"
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || response.statusText);
      $("debugOutput").textContent = JSON.stringify(data, null, 2);
      return data;
    }

    function setStatus(text, ok = true) {
      $("statusText").textContent = text;
      $("statusText").className = ok ? "muted status-ok" : "muted status-warn";
    }

    function addMessage(role, text, actions = []) {
      const node = document.createElement("div");
      node.className = `message ${role}`;
      node.textContent = text;
      if (actions.length) {
        const actionBox = document.createElement("div");
        actionBox.className = "message-actions";
        actions.forEach((action) => {
          const button = document.createElement("button");
          button.className = "secondary";
          button.textContent = action.label;
          button.addEventListener("click", () => {
            $("chatInput").value = action.prompt;
            sendChat();
          });
          actionBox.appendChild(button);
        });
        node.appendChild(actionBox);
      }
      $("chatLog").appendChild(node);
      $("chatLog").scrollTop = $("chatLog").scrollHeight;
    }

    async function loadStatus() {
      const status = await api("/api/status");
      $("versionPill").textContent = `v${status.version}`;
      setStatus(`服务正常：${status.project_path || "未配置项目"}`);
    }

    async function loadConfig() {
      appConfig = await api("/api/config");
      $("apiBase").value = appConfig.api_base_url || "";
      $("apiKey").value = appConfig.api_key || "";
      $("model").value = appConfig.model || "";
      $("projectPath").value = appConfig.content_project_path || "";
      $("cloudBase").value = appConfig.cloud?.base_url || "";
      $("contentType").value = appConfig.creator?.content_type || "";
      $("niche").value = appConfig.creator?.niche || "";
      $("platform").value = appConfig.creator?.platform || "";
      $("licenseText").textContent = `状态：${appConfig.license?.status || "trial"}，离线宽限：${appConfig.license?.offline_grace_days || 7} 天`;
    }

    async function saveConfig() {
      const payload = {
        api_base_url: $("apiBase").value.trim(),
        api_key: $("apiKey").value.trim(),
        model: $("model").value.trim(),
        content_project_path: $("projectPath").value.trim(),
        cloud: {
          base_url: $("cloudBase").value.trim()
        },
        creator: {
          content_type: $("contentType").value.trim(),
          niche: $("niche").value.trim(),
          platform: $("platform").value.trim()
        }
      };
      await api("/api/config", { method: "POST", body: JSON.stringify(payload) });
      await loadConfig();
      setStatus("配置已保存");
    }

    async function sendChat() {
      const message = $("chatInput").value.trim();
      if (!message) return;
      $("chatInput").value = "";
      addMessage("user", message);
      const reply = await api("/api/chat", { method: "POST", body: JSON.stringify({ message }) });
      addMessage("agent", formatReply(reply), replyActions(reply));
    }

    function formatReply(reply) {
      const artifacts = (reply.result?.artifacts || []).filter((item) => item.type !== "manifest");
      const paths = artifacts.map((item) => `- ${item.label}: ${item.path}`).join("\n");
      const llmNote = reply.result?.llm_note ? `\n模型：${reply.result.llm_note}` : "";
      const next = reply.result?.next_step?.prompt ? `\n下一步：${reply.result.next_step.label}` : "";
      const stage = STAGE_LABELS[reply.stage] || reply.stage;
      if (!paths && reply.result?.options) {
        return `${reply.summary}\n\n可继续：${reply.result.options.join("、")}`;
      }
      return `${reply.summary}${llmNote}${next}\n\n当前阶段：${stage}${paths ? "\n\n产物路径：\n" + paths : ""}`;
    }

    function replyActions(reply) {
      const step = reply.result?.next_step;
      if (!step?.prompt || step.label === "完成") return [];
      return [{ label: `继续：${step.label}`, prompt: step.prompt }];
    }

    async function loadInbox() {
      const data = await api("/api/inbox");
      const list = $("inboxList");
      list.innerHTML = "";
      const actionable = data.items.filter((item) => item.sync_status !== "processed");
      const processedCount = data.items.length - actionable.length;
      if (!actionable.length) {
        list.innerHTML = `<p class="muted">暂无待处理灵感。${processedCount ? `已处理 ${processedCount} 条，可在产物里查看。` : ""}</p>`;
        return;
      }
      actionable.slice().reverse().forEach((item) => {
        const node = document.createElement("div");
        node.className = "list-item";
        const title = document.createElement("div");
        title.className = "item-meta";
        title.textContent = `${typeLabel(item.type)} · ${statusLabel(item.sync_status)}`;
        const content = document.createElement("div");
        content.textContent = item.content || item.media_url || "(empty)";
        const actions = document.createElement("div");
        actions.className = "item-actions";
        [
          ["开始流程", "固化灵感"]
        ].forEach(([label, instruction]) => {
          const button = document.createElement("button");
          button.className = "secondary";
          button.textContent = label;
          button.addEventListener("click", () => produceFromInbox(item.id, instruction));
          actions.appendChild(button);
        });
        node.appendChild(title);
        node.appendChild(content);
        node.appendChild(actions);
        list.appendChild(node);
      });
      if (processedCount) {
        const note = document.createElement("p");
        note.className = "muted";
        note.textContent = `已处理 ${processedCount} 条历史灵感，默认不重复显示。`;
        list.appendChild(note);
      }
    }

    function typeLabel(type) {
      return {
        text: "文字灵感",
        voice: "语音灵感",
        image: "图片灵感",
        link: "链接灵感",
        video_link: "短视频链接"
      }[type] || "灵感";
    }

    function statusLabel(status) {
      return {
        pending: "待同步",
        pulled: "待处理",
        archived: "待处理",
        processed: "已处理"
      }[status] || "待处理";
    }

    async function produceFromInbox(id, instruction) {
      const result = await api("/api/inbox/produce", {
        method: "POST",
        body: JSON.stringify({ id, instruction })
      });
      addMessage("agent", formatReply(result.reply), replyActions(result.reply));
      await loadInbox();
      await loadFiles();
      setStatus(`已开始流程：${instruction}`);
    }

    async function syncOne() {
      const content = $("syncContent").value.trim();
      if (!content) return;
      const tags = $("syncTags").value.split(",").map((x) => x.trim()).filter(Boolean);
      await api("/api/sync/inspirations", {
        method: "POST",
        body: JSON.stringify({ items: [{ type: "text", content, tags }] })
      });
      $("syncContent").value = "";
      await loadInbox();
      setStatus("已同步一条手机灵感");
    }

    async function pullCloud() {
      const result = await api("/api/sync/inspirations", {
        method: "POST",
        body: JSON.stringify({})
      });
      await loadInbox();
      await loadFiles();
      setStatus(result.note || `已拉取 ${result.pulled} 条云端灵感`);
    }

    async function loadFiles() {
      const data = await api("/api/files");
      const list = $("fileList");
      list.innerHTML = "";
      Object.entries(data.groups).forEach(([group, files]) => {
        const node = document.createElement("div");
        node.className = "list-item";
        const rows = files.slice(0, 8).map((file) => `<div class="muted">${escapeHtml(file.path)}</div>`).join("");
        node.innerHTML = `<strong>${group}</strong> <span class="muted">${files.length} 个文件</span>${rows ? "<br>" + rows : ""}`;
        list.appendChild(node);
      });
    }

    async function activateLicense() {
      const token = $("licenseToken").value.trim();
      if (!token) return;
      await api("/api/license/activate", { method: "POST", body: JSON.stringify({ token }) });
      $("licenseToken").value = "";
      await loadConfig();
      setStatus("授权已写入本地 scaffold");
    }

    async function testModel() {
      await saveConfig();
      try {
        const result = await api("/api/llm/test", { method: "POST", body: JSON.stringify({}) });
        setStatus(`模型测试成功：${result.reply || result.note}`);
      } catch (error) {
        setStatus(`模型测试失败：${error.message}`, false);
      }
    }

    async function linkDevice() {
      const cloudBase = $("cloudBase").value.trim();
      if (!cloudBase) {
        setStatus("先填写 Cloud Base URL", false);
        return;
      }
      await saveConfig();
      const result = await api("/api/cloud/link-device", {
        method: "POST",
        body: JSON.stringify({ device_name: "desktop-workbench" })
      });
      await loadConfig();
      setStatus(`已绑定设备：${result.device.device_id}`);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-tab]").forEach((x) => x.classList.remove("active"));
        button.classList.add("active");
        ["inbox", "sync", "files", "debug"].forEach((name) => {
          $(`tab-${name}`).hidden = name !== button.dataset.tab;
        });
      });
    });

    $("saveConfig").addEventListener("click", saveConfig);
    $("testModel").addEventListener("click", testModel);
    $("sendChat").addEventListener("click", sendChat);
    $("chatInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) sendChat();
    });
    $("loadInbox").addEventListener("click", loadInbox);
    $("syncOne").addEventListener("click", syncOne);
    $("pullCloud").addEventListener("click", pullCloud);
    $("loadFiles").addEventListener("click", loadFiles);
    $("activateLicense").addEventListener("click", activateLicense);
    $("linkDevice").addEventListener("click", linkDevice);
    $("refreshAll").addEventListener("click", async () => {
      await loadStatus();
      await loadConfig();
      await loadInbox();
      await loadFiles();
    });

    (async function init() {
      try {
        await loadStatus();
        await loadConfig();
        await loadInbox();
        await loadFiles();
        addMessage("agent", "我已经准备好了。先丢一个灵感火花，我会先把它固化成选题卡，再带你做审核、评分、预测和写视频脚本。");
      } catch (error) {
        setStatus(error.message, false);
      }
    })();
  </script>
</body>
</html>
